<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics — CorpPool</title>
  <meta name="description" content="Analyse carpool trends, CO₂ savings, driver utilization, and monthly summaries." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="layout">
  <div id="sidebar-ph"></div>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Analytics</h1>
        <p class="page-subtitle">Insights into your company's carpool performance</p>
      </div>
      <button class="btn btn-secondary" id="btn-export">📥 &nbsp;Export CSV</button>
    </div>

    <div class="page-content animate-in">
      <!-- Summary KPIs -->
      <div class="stats-grid" id="analytics-kpis"></div>

      <!-- Charts row 1 -->
      <div class="analytics-grid">
        <div class="card">
          <div class="card-header">
            <span class="card-title">🌿 CO₂ Saved (kg)</span>
            <span class="text-sm text-muted">Jan – Jun 2026</span>
          </div>
          <div class="card-body">
            <div class="chart-container" style="height:220px">
              <canvas id="co2Chart"></canvas>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">🏢 Rides by Department</span>
            <span class="text-sm text-muted">All time</span>
          </div>
          <div class="card-body">
            <div class="chart-container" style="height:220px">
              <canvas id="deptChart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- Charts row 2 -->
      <div class="analytics-grid">
        <div class="card">
          <div class="card-header">
            <span class="card-title">🚗 Driver Utilization</span>
            <span class="text-sm text-muted">Current snapshot</span>
          </div>
          <div class="card-body" style="display:flex;align-items:center;gap:32px">
            <div class="chart-container" style="height:220px;width:220px;flex-shrink:0">
              <canvas id="utilChart"></canvas>
            </div>
            <div id="util-legend" style="flex:1"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">📊 Rides per Month</span>
            <span class="text-sm text-muted">2026</span>
          </div>
          <div class="card-body">
            <div class="chart-container" style="height:220px">
              <canvas id="monthlyRidesChart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- Monthly table -->
      <div class="card mt-20">
        <div class="card-header">
          <span class="card-title">📋 Monthly Summary</span>
        </div>
        <div class="table-wrapper">
          <table class="monthly-table">
            <thead>
              <tr>
                <th>Month</th>
                <th>Total Rides</th>
                <th>Active Drivers</th>
                <th>CO₂ Saved (kg)</th>
                <th>Total KM</th>
              </tr>
            </thead>
            <tbody id="monthly-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="js/app.js"></script>
<script src="js/analytics.js"></script>
</body>
</html>
