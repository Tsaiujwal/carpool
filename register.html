<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Onboarding — CorpPool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <!-- EmailJS SDK -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; overflow: hidden; }
    body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.18; pointer-events: none; }
    body::before { width: 600px; height: 600px; background: radial-gradient(circle, #6366f1, transparent); top: -150px; left: -150px; }
    body::after { width: 500px; height: 500px; background: radial-gradient(circle, #10b981, transparent); bottom: -120px; right: -120px; }
    
    .register-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(99, 102, 241, 0.25); border-radius: 24px; padding: 44px 40px; width: 100%; max-width: 500px; backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04); position: relative; z-index: 1; animation: fadeUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
    
    .logo-wrap { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 24px; }
    .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, #6366f1, #4f46e5); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 8px 24px rgba(99,102,241,0.45); }
    .logo-name { font-size: 24px; font-weight: 800; letter-spacing: -0.03em; background: linear-gradient(135deg, #f1f5f9, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    
    .register-title { font-size: 20px; font-weight: 700; color: #f1f5f9; text-align: center; margin-bottom: 6px; letter-spacing: -0.01em; }
    .register-subtitle { font-size: 14px; color: #64748b; text-align: center; margin-bottom: 28px; line-height: 1.6; }
    
    .steps { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 28px; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(148,163,184,0.2); transition: all 0.3s ease; }
    .step-dot.active { background: #6366f1; width: 24px; border-radius: 4px; }
    .step-dot.done { background: #10b981; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group.full { grid-column: 1 / -1; }
    
    .form-label { font-size: 13px; font-weight: 500; color: #94a3b8; }
    .form-input, .country-code { background: rgba(15,23,42,0.8); border: 1px solid rgba(148,163,184,0.15); border-radius: 10px; padding: 12px 14px; font-size: 15px; color: #f1f5f9; font-family: inherit; outline: none; transition: all 0.2s ease; }
    .form-input:focus, .country-code:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
    .form-input::placeholder { color: #475569; }
    
    .phone-input-group { display: flex; gap: 10px; }
    .country-code { width: 100px; padding: 12px 6px; font-size: 14px; font-weight: 600; cursor: pointer; appearance: none; -webkit-appearance: none; }
    .country-code option { background: #0f172a; color: #f1f5f9; }
    
    .btn-full { width: 100%; padding: 14px; background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; box-shadow: 0 6px 24px rgba(99,102,241,0.45); transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
    .btn-full:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(99,102,241,0.55); }
    .btn-full:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Dual OTP Section */
    .otp-section { background: rgba(15,23,42,0.4); border-radius: 16px; padding: 20px; border: 1px solid rgba(148,163,184,0.1); margin-bottom: 20px; }
    .otp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .otp-label { font-size: 14px; font-weight: 600; color: #f1f5f9; display: flex; align-items: center; gap: 8px; }
    .otp-sent-to { font-size: 12px; color: #64748b; }
    
    .otp-group { display: flex; gap: 8px; justify-content: center; }
    .otp-box { width: 44px; height: 50px; background: rgba(15,23,42,0.8); border: 1.5px solid rgba(148,163,184,0.15); border-radius: 10px; font-size: 20px; font-weight: 700; color: #f1f5f9; text-align: center; font-family: inherit; outline: none; transition: all 0.2s ease; }
    .otp-box:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
    .otp-box.filled { border-color: #10b981; background: rgba(16,185,129,0.06); color: #34d399; }
    .otp-box.error { border-color: #f43f5e; color: #f43f5e; }
    
    .otp-status { font-size: 12px; text-align: right; margin-top: 8px; color: #64748b; height: 15px; }
    .otp-status.success { color: #10b981; }
    .otp-status.error { color: #f43f5e; }

    .step { display: none; } 
    .step.active { display: block; animation: fadeUp 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
    
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-full.loading .spinner { display: block; } .btn-full.loading .btn-text { display: none; }
    
    .login-link { display: block; text-align: center; margin-top: 20px; font-size: 14px; color: #94a3b8; text-decoration: none; }
    .login-link span { color: #6366f1; font-weight: 600; }
    
    #recaptcha-container { display: flex; justify-content: center; margin-top: 15px; }
  </style>
</head>
<body>

<div class="register-card">
  <div class="logo-wrap">
    <div class="logo-icon">🚗</div>
    <div class="logo-name">CorpPool</div>
  </div>

  <div class="steps">
    <div class="step-dot active" id="dot-1"></div>
    <div class="step-dot" id="dot-2"></div>
  </div>

  <!-- STEP 1: Details -->
  <div class="step active" id="step-1">
    <div class="register-title">Employee Onboarding</div>
    <p class="register-subtitle">Join your company's carpool network</p>

    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Employee ID</label>
        <input type="text" class="form-input" id="emp-id" placeholder="e.g. EMP-204" required />
      </div>
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-input" id="emp-name" placeholder="John Doe" required />
      </div>
      <div class="form-group full">
        <label class="form-label">Company Name</label>
        <!-- DataList provides both a dropdown of existing and allows typing a new one -->
        <input list="company-list" class="form-input" id="emp-company" placeholder="Select or type your company..." required />
        <datalist id="company-list">
          <option value="TechCorp Solutions">
          <option value="Global Innovations">
          <option value="Acme Corp">
          <option value="Nexus Systems">
        </datalist>
      </div>
      <div class="form-group full">
        <label class="form-label">Work Email</label>
        <input type="email" class="form-input" id="emp-email" placeholder="john@company.com" required />
      </div>
      <div class="form-group full">
        <label class="form-label">Mobile Number</label>
        <div class="phone-input-group">
          <select class="country-code" id="country-code">
            <option value="+1">🇺🇸 +1</option>
            <option value="+44">🇬🇧 +44</option>
            <option value="+91" selected>🇮🇳 +91</option>
            <option value="+61">🇦🇺 +61</option>
            <option value="+971">🇦🇪 +971</option>
            <option value="+65">🇸🇬 +65</option>
          </select>
          <input type="tel" class="form-input" id="emp-phone" placeholder="98765 43210" style="flex:1;" required />
        </div>
      </div>
    </div>

    <button class="btn-full" id="btn-continue">
      <span class="spinner"></span>
      <span class="btn-text">Continue to Verification →</span>
    </button>
    <div id="recaptcha-container"></div>
    <p id="error-msg-1" style="color:#f43f5e; font-size:13px; text-align:center; margin-top:12px; display:none;"></p>
    
    <a href="login.html" class="login-link">Already verified? <span>Log in</span></a>
  </div>

  <!-- STEP 2: Dual Verification -->
  <div class="step" id="step-2">
    <div class="register-title">Dual Verification 🔐</div>
    <p class="register-subtitle">For security, please verify both contacts.</p>

    <!-- Email Verification -->
    <div class="otp-section">
      <div class="otp-header">
        <div class="otp-label">✉️ Email OTP</div>
        <div class="otp-sent-to" id="lbl-email"></div>
      </div>
      <div class="otp-group" id="email-otp-group">
        <input class="otp-box e-box" type="text" maxlength="1" inputmode="numeric" />
        <input class="otp-box e-box" type="text" maxlength="1" inputmode="numeric" />
        <input class="otp-box e-box" type="text" maxlength="1" inputmode="numeric" />
        <input class="otp-box e-box" type="text" maxlength="1" inputmode="numeric" />
        <input class="otp-box e-box" type="text" maxlength="1" inputmode="numeric" />
        <input class="otp-box e-box" type="text" maxlength="1" inputmode="numeric" />
      </div>
      <div class="otp-status" id="email-status">Waiting for code...</div>
    </div>

    <!-- Phone Verification -->
    <div class="otp-section">
      <div class="otp-header">
        <div class="otp-label">📱 SMS OTP</div>
        <div class="otp-sent-to" id="lbl-phone"></div>
      </div>
      <div class="otp-group" id="phone-otp-group">
        <input class="otp-box p-box" type="text" maxlength="1" inputmode="numeric" />
        <input class="otp-box p-box" type="text" maxlength="1" inputmode="numeric" />
        <input class="otp-box p-box" type="text" maxlength="1" inputmode="numeric" />
        <input class="otp-box p-box" type="text" maxlength="1" inputmode="numeric" />
        <input class="otp-box p-box" type="text" maxlength="1" inputmode="numeric" />
        <input class="otp-box p-box" type="text" maxlength="1" inputmode="numeric" />
      </div>
      <div class="otp-status" id="phone-status">Waiting for code...</div>
    </div>

    <button class="btn-full" id="btn-verify" disabled style="opacity:0.5;">
      <span class="spinner"></span>
      <span class="btn-text">Complete Onboarding</span>
    </button>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/db.js"></script>
<script>
// NOTE TO USER: To use real EmailJS, you need to sign up at emailjs.com,
// get your public key, and initialize it here: emailjs.init("YOUR_PUBLIC_KEY");

let confirmationResult = null; // Firebase Phone Auth result
let generatedEmailOTP = '';    // Generated 6-digit for email
let isEmailVerified = false;
let isPhoneVerified = false;
let formData = {};

// Initialize Recaptcha
window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { size: 'invisible' });

document.getElementById('btn-continue').addEventListener('click', async () => {
  const id = document.getElementById('emp-id').value.trim();
  const name = document.getElementById('emp-name').value.trim();
  const company = document.getElementById('emp-company').value.trim();
  const email = document.getElementById('emp-email').value.trim();
  const phone = document.getElementById('emp-phone').value.trim();
  const code = document.getElementById('country-code').value;

  if (!id || !name || !company || !email || !phone) return alert('Please fill all fields');
  
  formData = { id, name, company, email, phone: code + phone, role: 'employee' };
  
  const btn = document.getElementById('btn-continue');
  btn.classList.add('loading'); btn.disabled = true;

  try {
    // 1. Send Firebase SMS
    confirmationResult = await firebase.auth().signInWithPhoneNumber(formData.phone, window.recaptchaVerifier);
    
    // 2. Send Email OTP (Using simulation for now, replace with actual EmailJS call in production)
    generatedEmailOTP = Math.floor(100000 + Math.random() * 900000).toString();
    console.log("Email OTP Generated:", generatedEmailOTP);
    
    // DEMO ONLY: We will alert the OTP since we don't have EmailJS keys configured yet.
    // In production: emailjs.send("service_id", "template_id", { to_email: email, otp: generatedEmailOTP });
    alert(`[DEMO MODE]\nYour Email OTP is: ${generatedEmailOTP}\n\n(In production, this is sent silently via EmailJS)`);

    // Move to Step 2
    document.getElementById('dot-1').className = 'step-dot done';
    document.getElementById('dot-2').className = 'step-dot active';
    document.getElementById('step-1').classList.remove('active');
    document.getElementById('step-2').classList.add('active');
    document.getElementById('lbl-email').textContent = email;
    document.getElementById('lbl-phone').textContent = formData.phone;
    
  } catch (error) {
    console.error(error);
    const errMsg = document.getElementById('error-msg-1');
    errMsg.textContent = error.message; errMsg.style.display = 'block';
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
});

// OTP Input Handling (Works for both Email & Phone groups)
function setupOTPGroup(groupSelector, boxClass, type) {
  const group = document.querySelector(groupSelector);
  
  // Paste handler
  group.addEventListener('paste', e => {
    e.preventDefault();
    const digits = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').split('').slice(0, 6);
    if (digits.length === 0) return;
    const boxes = [...document.querySelectorAll(boxClass)];
    boxes.forEach(b => { b.value = ''; b.classList.remove('filled', 'error'); });
    digits.forEach((d, i) => { boxes[i].value = d; boxes[i].classList.add('filled'); });
    if (digits.length === 6) verifyCode(type, boxes.map(b=>b.value).join(''));
    else boxes[digits.length].focus();
  });

  // Input handler
  group.addEventListener('input', e => {
    const boxes = [...document.querySelectorAll(boxClass)];
    const idx = boxes.indexOf(e.target);
    if (!/^\d$/.test(e.target.value)) { e.target.value = ''; return; }
    e.target.classList.add('filled');
    if (idx < 5) boxes[idx + 1].focus();
    else verifyCode(type, boxes.map(b=>b.value).join(''));
  });

  // Backspace handler
  group.addEventListener('keydown', e => {
    const boxes = [...document.querySelectorAll(boxClass)];
    const idx = boxes.indexOf(e.target);
    if (e.key === 'Backspace') {
      if (e.target.value) { e.target.value = ''; e.target.classList.remove('filled', 'error'); }
      else if (idx > 0) { boxes[idx - 1].focus(); boxes[idx - 1].value = ''; boxes[idx - 1].classList.remove('filled', 'error'); }
      document.getElementById(`${type}-status`).textContent = 'Waiting for code...';
      document.getElementById(`${type}-status`).className = 'otp-status';
    }
  });
}

setupOTPGroup('#email-otp-group', '.e-box', 'email');
setupOTPGroup('#phone-otp-group', '.p-box', 'phone');

async function verifyCode(type, code) {
  const statusEl = document.getElementById(`${type}-status`);
  const boxes = document.querySelectorAll(type === 'email' ? '.e-box' : '.p-box');
  
  if (type === 'email') {
    if (code === generatedEmailOTP) {
      statusEl.textContent = '✅ Email verified!';
      statusEl.className = 'otp-status success';
      isEmailVerified = true;
    } else {
      statusEl.textContent = '❌ Incorrect code';
      statusEl.className = 'otp-status error';
      boxes.forEach(b => b.classList.add('error'));
    }
  } else {
    // Phone verify
    try {
      statusEl.textContent = 'Verifying...';
      const result = await confirmationResult.confirm(code);
      statusEl.textContent = '✅ Phone verified!';
      statusEl.className = 'otp-status success';
      isPhoneVerified = true;
      formData.uid = result.user.uid; // Save firebase auth UID
    } catch (e) {
      statusEl.textContent = '❌ Incorrect code';
      statusEl.className = 'otp-status error';
      boxes.forEach(b => b.classList.add('error'));
    }
  }
  
  checkFinalSubmit();
}

function checkFinalSubmit() {
  const btn = document.getElementById('btn-verify');
  if (isEmailVerified && isPhoneVerified) {
    btn.disabled = false;
    btn.style.opacity = '1';
  }
}

// Final Submission
document.getElementById('btn-verify').addEventListener('click', async () => {
  const btn = document.getElementById('btn-verify');
  btn.classList.add('loading'); btn.disabled = true;

  try {
    // Save to Firestore: We create a global 'users' doc for cross-company routing,
    // and an employee doc in the specific company's collection.
    
    // We will standardize company IDs (e.g., lowercase, spaces replaced)
    const companyId = formData.company.toLowerCase().replace(/[^a-z0-9]/g, '-');
    
    // Save minimal mapping in global users collection
    await db.collection('users').doc(formData.uid).set({
      role: 'employee',
      companyId: companyId
    });

    // Save full profile in company's employee collection
    await db.collection('companies').doc(companyId).collection('employees').doc(formData.uid).set({
      id: formData.id,
      name: formData.name,
      email: formData.email,
      phone: formData.phone,
      department: 'General', // Default
      role: 'both',
      totalRides: 0,
      co2Saved: 0,
      joinDate: new Date().toISOString().split('T')[0],
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    // Create Company doc if it doesn't exist
    await db.collection('companies').doc(companyId).set({
      name: formData.company,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });

    // Success! Redirect to employee dashboard
    btn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
    btn.querySelector('.btn-text').textContent = '✅ Onboarding Complete!';
    
    setTimeout(() => {
      window.location.href = 'employee-dashboard.html';
    }, 1000);

  } catch (error) {
    console.error("Error saving profile:", error);
    alert("Failed to save profile. Please try again.");
    btn.classList.remove('loading'); btn.disabled = false;
  }
});
</script>
</body>
</html>
