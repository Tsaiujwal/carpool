<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employees — CorpPool</title>
  <meta name="description" content="Manage employee carpool profiles, roles, and participation statistics." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="layout">
  <div id="sidebar-ph"></div>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Employees</h1>
        <p class="page-subtitle" id="emp-count">Loading…</p>
      </div>
      <button class="btn btn-primary" id="btn-add-emp">➕ &nbsp;Add Employee</button>
    </div>

    <div class="page-content animate-in">
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="search-bar">
            <span>🔍</span>
            <input type="text" id="emp-search" placeholder="Search name or email…" />
          </div>
          <select class="form-control" id="dept-filter" style="width:160px">
            <option value="all">All Departments</option>
            <option>Engineering</option>
            <option>Sales</option>
            <option>HR</option>
            <option>Finance</option>
            <option>Marketing</option>
            <option>Operations</option>
          </select>
          <select class="form-control" id="role-filter" style="width:140px">
            <option value="all">All Roles</option>
            <option value="driver">Driver</option>
            <option value="passenger">Passenger</option>
            <option value="both">Both</option>
          </select>
        </div>
      </div>

      <div class="employee-grid" id="employee-grid"></div>
    </div>
  </main>
</div>

<!-- Add Employee Modal -->
<div class="modal-overlay" id="modal-add-emp">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">👤 Add Employee</span>
      <button class="modal-close" onclick="closeModal('modal-add-emp')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" id="emp-name" placeholder="e.g. Rahul Gupta" />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="emp-email" placeholder="rahul@company.com" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Department</label>
          <select class="form-control" id="emp-dept">
            <option>Engineering</option>
            <option>Sales</option>
            <option>HR</option>
            <option>Finance</option>
            <option>Marketing</option>
            <option>Operations</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select class="form-control" id="emp-role">
            <option value="driver">Driver</option>
            <option value="passenger">Passenger</option>
            <option value="both">Both</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input type="tel" class="form-control" id="emp-phone" placeholder="+91 98765 43210" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-add-emp')">Cancel</button>
      <button class="btn btn-primary" id="btn-save-emp">Add Employee</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/employees.js"></script>
</body>
</html>
