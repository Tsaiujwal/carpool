<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Portal — CorpPool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .portal-layout { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
    .portal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .profile-summary { display: flex; align-items: center; gap: 15px; }
    .profile-avatar { width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, #6366f1, #4f46e5); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; color: white; box-shadow: 0 8px 24px rgba(99,102,241,0.4); }
    .profile-info h1 { font-size: 24px; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; }
    .profile-info p { font-size: 14px; color: #94a3b8; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .stat-card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(148,163,184,0.1); border-radius: 20px; padding: 24px; backdrop-filter: blur(12px); display: flex; align-items: center; gap: 20px; transition: transform 0.2s; }
    .stat-card:hover { transform: translateY(-3px); border-color: rgba(99,102,241,0.3); }
    .stat-icon { width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .stat-card:nth-child(1) .stat-icon { background: rgba(16,185,129,0.1); color: #10b981; }
    .stat-card:nth-child(2) .stat-icon { background: rgba(99,102,241,0.1); color: #6366f1; }
    .stat-card:nth-child(3) .stat-icon { background: rgba(245,158,11,0.1); color: #f59e0b; }
    .stat-details h3 { font-size: 28px; font-weight: 800; color: #f1f5f9; margin-bottom: 4px; }
    .stat-details p { font-size: 14px; color: #64748b; font-weight: 500; }
    
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .section-title { font-size: 20px; font-weight: 700; color: #f1f5f9; display: flex; align-items: center; gap: 10px; }
    .section-title span { background: rgba(99,102,241,0.1); color: #818cf8; padding: 4px 10px; border-radius: 20px; font-size: 13px; font-weight: 600; }
    
    .rides-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .ride-card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(148,163,184,0.1); border-radius: 20px; padding: 20px; backdrop-filter: blur(12px); position: relative; }
    .ride-card.upcoming { border: 1px solid rgba(99,102,241,0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.2), inset 0 0 20px rgba(99,102,241,0.05); }
    .ride-header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid rgba(148,163,184,0.1); padding-bottom: 15px; }
    .route-name { font-size: 16px; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; }
    .ride-time { font-size: 13px; color: #94a3b8; display: flex; align-items: center; gap: 6px; }
    .seats-badge { background: rgba(16,185,129,0.1); color: #10b981; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; height: fit-content; }
    .seats-badge.full { background: rgba(244,63,94,0.1); color: #f43f5e; }
    
    .ride-people { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
    .person-row { display: flex; align-items: center; gap: 10px; }
    .person-avatar { width: 32px; height: 32px; border-radius: 50%; background: #475569; display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; font-weight: 600; }
    .person-info { display: flex; flex-direction: column; }
    .person-name { font-size: 14px; font-weight: 600; color: #e2e8f0; }
    .person-role { font-size: 12px; color: #64748b; }
    
    .btn-action { width: 100%; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; border: none; }
    .btn-join { background: rgba(99,102,241,0.1); color: #818cf8; border: 1px solid rgba(99,102,241,0.2); }
    .btn-join:hover { background: rgba(99,102,241,0.2); }
    .btn-cancel { background: rgba(244,63,94,0.1); color: #fb7185; border: 1px solid rgba(244,63,94,0.2); }
    .btn-cancel:hover { background: rgba(244,63,94,0.2); }
    
    .btn-logout { background: transparent; border: 1px solid rgba(148,163,184,0.2); color: #94a3b8; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-logout:hover { background: rgba(148,163,184,0.1); color: #f1f5f9; }

    /* Empty state */
    .empty-state { grid-column: 1 / -1; text-align: center; padding: 40px; background: rgba(30, 41, 59, 0.3); border-radius: 16px; border: 1px dashed rgba(148,163,184,0.2); }
    .empty-state-icon { font-size: 40px; margin-bottom: 15px; opacity: 0.5; }
    .empty-state p { color: #94a3b8; font-size: 15px; }

    #loading-overlay { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .spinner-lg { width: 40px; height: 40px; border: 3px solid rgba(99,102,241,0.2); border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; }
  </style>
</head>
<body>

<div id="loading-overlay"><div class="spinner-lg"></div></div>

<div class="portal-layout">
  <header class="portal-header">
    <div class="profile-summary">
      <div class="profile-avatar" id="emp-avatar">--</div>
      <div class="profile-info">
        <h1 id="emp-name">Loading Profile...</h1>
        <p><span id="emp-id"></span> • <span id="emp-company"></span></p>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">Log Out</button>
  </header>

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">🌱</div>
      <div class="stat-details">
        <h3 id="stat-co2">0.0</h3>
        <p>Tons CO₂ Saved</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🚗</div>
      <div class="stat-details">
        <h3 id="stat-rides">0</h3>
        <p>Total Rides Taken</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">⭐</div>
      <div class="stat-details">
        <h3 id="stat-points">0</h3>
        <p>Green Points</p>
      </div>
    </div>
  </div>

  <!-- MY RIDES -->
  <div class="section-header">
    <h2 class="section-title">My Upcoming Rides <span id="count-my">0</span></h2>
  </div>
  <div class="rides-grid" id="my-rides-grid">
    <!-- Populated by JS -->
  </div>

  <!-- AVAILABLE RIDES -->
  <div class="section-header">
    <h2 class="section-title">Available to Join <span id="count-avail">0</span></h2>
  </div>
  <div class="rides-grid" id="avail-rides-grid">
    <!-- Populated by JS -->
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>

<script>
let currentUser = null;
let employeeData = null;
let companyId = null;

firebase.auth().onAuthStateChanged(async (user) => {
  if (user) {
    currentUser = user;
    await loadEmployeeData();
  } else {
    window.location.href = 'login.html';
  }
});

async function loadEmployeeData() {
  try {
    // Get Global User mapping to find Company ID
    const userDoc = await db.collection('users').doc(currentUser.uid).get();
    if (!userDoc.exists) throw new Error("No user mapping found");
    
    companyId = userDoc.data().companyId;
    if (userDoc.data().role !== 'employee') {
      window.location.href = 'index.html'; // Admins go to main dashboard
      return;
    }

    // Get Employee Profile
    const empDoc = await db.collection('companies').doc(companyId).collection('employees').doc(currentUser.uid).get();
    employeeData = empDoc.data();
    
    // Get Company info
    const compDoc = await db.collection('companies').doc(companyId).get();
    const compName = compDoc.exists ? compDoc.data().name : companyId;

    renderProfile(compName);
    await loadRides();
    
    document.getElementById('loading-overlay').style.display = 'none';
  } catch (error) {
    console.error("Error loading data:", error);
    alert("Error loading profile data. Please try logging in again.");
    firebase.auth().signOut();
  }
}

function renderProfile(compName) {
  const name = employeeData.name || "Employee";
  document.getElementById('emp-name').textContent = name;
  document.getElementById('emp-id').textContent = employeeData.id || "ID-N/A";
  document.getElementById('emp-company').textContent = compName;
  document.getElementById('emp-avatar').textContent = name.charAt(0).toUpperCase();
  
  document.getElementById('stat-co2').textContent = (employeeData.co2Saved || 0).toFixed(1);
  document.getElementById('stat-rides').textContent = employeeData.totalRides || 0;
  document.getElementById('stat-points').textContent = ((employeeData.totalRides || 0) * 15) + Math.floor(employeeData.co2Saved * 100);
}

async function loadRides() {
  const ridesSnap = await db.collection('companies').doc(companyId).collection('rides').get();
  const allRides = ridesSnap.docs.map(d => ({id: d.id, ...d.data()}));
  
  const myRides = [];
  const availRides = [];
  
  // Filter rides (assuming status is 'scheduled')
  allRides.forEach(ride => {
    if (ride.status !== 'scheduled') return; // Only show future rides
    
    const isDriver = ride.driverId === employeeData.id;
    const isPassenger = (ride.passengers || []).includes(employeeData.name);
    
    if (isDriver || isPassenger) {
      myRides.push(ride);
    } else if ((ride.passengers || []).length < ride.seats) {
      availRides.push(ride);
    }
  });
  
  renderRides('my-rides-grid', myRides, true);
  renderRides('avail-rides-grid', availRides, false);
  
  document.getElementById('count-my').textContent = myRides.length;
  document.getElementById('count-avail').textContent = availRides.length;
}

function renderRides(containerId, rides, isMine) {
  const container = document.getElementById(containerId);
  if (rides.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">${isMine ? '📭' : '🚗'}</div>
        <p>${isMine ? "You don't have any upcoming rides." : "No available rides to join right now."}</p>
      </div>`;
    return;
  }
  
  container.innerHTML = rides.map(ride => {
    const passengers = ride.passengers || [];
    const openSeats = ride.seats - passengers.length;
    const isDriver = ride.driverId === employeeData.id;
    
    // People list HTML
    let peopleHtml = `
      <div class="person-row">
        <div class="person-avatar" style="background:#6366f1">${ride.driverName.charAt(0)}</div>
        <div class="person-info">
          <span class="person-name">${ride.driverName} ${isDriver ? '(You)' : ''}</span>
          <span class="person-role">Driver</span>
        </div>
      </div>
    `;
    passengers.forEach(p => {
      const isMe = p === employeeData.name;
      peopleHtml += `
        <div class="person-row">
          <div class="person-avatar" style="background:#10b981">${p.charAt(0)}</div>
          <div class="person-info">
            <span class="person-name">${p} ${isMe ? '(You)' : ''}</span>
            <span class="person-role">Passenger</span>
          </div>
        </div>
      `;
    });

    let actionBtnHtml = '';
    if (isMine) {
      actionBtnHtml = `<button class="btn-action btn-cancel" onclick="leaveRide('${ride.id}')">${isDriver ? 'Cancel Ride' : 'Leave Ride'}</button>`;
    } else {
      actionBtnHtml = `<button class="btn-action btn-join" onclick="joinRide('${ride.id}')">Join Ride</button>`;
    }

    return `
      <div class="ride-card ${isMine ? 'upcoming' : ''}">
        <div class="ride-header">
          <div>
            <div class="route-name">${ride.routeName}</div>
            <div class="ride-time">📅 ${ride.date} • ⏰ ${ride.time}</div>
          </div>
          <div class="seats-badge ${openSeats === 0 ? 'full' : ''}">${openSeats} Seats Left</div>
        </div>
        <div class="ride-people">
          ${peopleHtml}
        </div>
        ${actionBtnHtml}
      </div>
    `;
  }).join('');
}

async function joinRide(rideId) {
  // Real implementation would update Firestore array
  alert("Join Ride functionality will update Firestore: adding your name to passengers array.");
}

async function leaveRide(rideId) {
  // Real implementation would update Firestore array
  alert("Leave Ride functionality will update Firestore: removing your name from passengers array.");
}

function logout() {
  firebase.auth().signOut().then(() => window.location.href = 'login.html');
}
</script>
</body>
</html>
