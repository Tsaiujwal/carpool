<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Routes — CorpPool</title>
  <meta name="description" content="Manage and view all registered carpool routes across your company locations." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="layout">
  <div id="sidebar-ph"></div>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Routes</h1>
        <p class="page-subtitle" id="route-count">Loading…</p>
      </div>
      <button class="btn btn-primary" id="btn-add-route">➕ &nbsp;Add Route</button>
    </div>

    <div class="page-content animate-in">
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="search-bar">
            <span>🔍</span>
            <input type="text" id="route-search" placeholder="Search routes…" />
          </div>
        </div>
      </div>
      <div class="route-grid" id="route-grid"></div>
    </div>
  </main>
</div>

<!-- Add Route Modal -->
<div class="modal-overlay" id="modal-add-route">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">🗺️ Add Route</span>
      <button class="modal-close" onclick="closeModal('modal-add-route')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Route Name</label>
        <input type="text" class="form-control" id="route-name" placeholder="e.g. North Campus → HQ" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Origin</label>
          <input type="text" class="form-control" id="route-from" placeholder="Starting point" />
        </div>
        <div class="form-group">
          <label class="form-label">Destination</label>
          <input type="text" class="form-control" id="route-to" placeholder="End point" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Distance (km)</label>
          <input type="number" class="form-control" id="route-distance" placeholder="12.5" step="0.1" min="0" />
        </div>
        <div class="form-group">
          <label class="form-label">Est. Duration (min)</label>
          <input type="number" class="form-control" id="route-duration" placeholder="30" min="0" />
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-add-route')">Cancel</button>
      <button class="btn btn-primary" id="btn-save-route">Add Route</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/routes.js"></script>
</body>
</html>
