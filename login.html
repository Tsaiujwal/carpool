<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — CorpPool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden;position:relative}
    body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(80px);opacity:.18;pointer-events:none}
    body::before{width:600px;height:600px;background:radial-gradient(circle,#6366f1,transparent);top:-150px;left:-150px}
    body::after{width:500px;height:500px;background:radial-gradient(circle,#10b981,transparent);bottom:-120px;right:-120px}
    .card{background:rgba(30,41,59,.7);border:1px solid rgba(99,102,241,.25);border-radius:24px;padding:44px 40px;width:100%;max-width:420px;backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);box-shadow:0 24px 80px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04);position:relative;z-index:1;animation:fadeUp .5s cubic-bezier(.34,1.56,.64,1) both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    .logo-wrap{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:28px}
    .logo-icon{width:50px;height:50px;background:linear-gradient(135deg,#6366f1,#4f46e5);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 8px 24px rgba(99,102,241,.45)}
    .logo-name{font-size:26px;font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,#f1f5f9,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    h1{font-size:20px;font-weight:700;color:#f1f5f9;text-align:center;margin-bottom:6px}
    .sub{font-size:14px;color:#64748b;text-align:center;margin-bottom:32px;line-height:1.6}
    .form-group{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
    label{font-size:13px;font-weight:500;color:#94a3b8}
    .input-wrap{position:relative}
    .input-wrap .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
    input[type=text],input[type=password]{width:100%;background:rgba(15,23,42,.8);border:1px solid rgba(148,163,184,.15);border-radius:10px;padding:12px 16px 12px 42px;font-size:15px;color:#f1f5f9;font-family:inherit;outline:none;transition:all .2s}
    input[type=text]:focus,input[type=password]:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.2)}
    input::placeholder{color:#475569}
    .toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:#64748b;transition:color .2s;padding:0}
    .toggle-pw:hover{color:#94a3b8}
    .forgot-link{display:block;text-align:right;font-size:13px;color:#6366f1;font-weight:600;text-decoration:none;margin-top:-10px;margin-bottom:22px;transition:color .2s}
    .forgot-link:hover{color:#818cf8}
    .btn{width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#4f46e5);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 6px 24px rgba(99,102,241,.45);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(99,102,241,.55)}
    .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .btn.loading .spinner{display:block}.btn.loading .btn-text{display:none}
    .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:none}
    @keyframes spin{to{transform:rotate(360deg)}}
    .divider{text-align:center;color:#334155;font-size:13px;margin:20px 0;position:relative}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:rgba(148,163,184,.15)}
    .divider::before{left:0}.divider::after{right:0}
    .reg-link{text-align:center;font-size:14px;color:#94a3b8;margin-top:18px}
    .reg-link a{color:#6366f1;font-weight:600;text-decoration:none}
    .reg-link a:hover{color:#818cf8}
    .err{color:#f87171;font-size:13px;text-align:center;margin-top:12px;display:none}
  </style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">🚗</div>
    <div class="logo-name">CorpPool</div>
  </div>

  <h1>Welcome back 👋</h1>
  <p class="sub">Sign in to your CorpPool account</p>

  <div class="form-group">
    <label for="username">Username</label>
    <div class="input-wrap">
      <span class="icon">👤</span>
      <input type="text" id="username" placeholder="your_username" autocomplete="username"/>
    </div>
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <div class="input-wrap">
      <span class="icon">🔑</span>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
      <button class="toggle-pw" id="toggle-pw" type="button" aria-label="Show password">👁️</button>
    </div>
  </div>

  <a href="forgot-password.html" class="forgot-link">Forgot password?</a>

  <button class="btn" id="btn-login">
    <span class="spinner"></span>
    <span class="btn-text">Sign In →</span>
  </button>

  <p class="err" id="err-msg"></p>

  <div class="divider">or</div>

  <p class="reg-link">New employee? <a href="register.html">Create an account</a></p>
</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<script>
  // Toggle password visibility
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
    document.getElementById('toggle-pw').textContent = pw.type === 'password' ? '👁️' : '🙈';
  });

  // Sign In
  document.getElementById('btn-login').addEventListener('click', async () => {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('err-msg');
    const btn      = document.getElementById('btn-login');

    if (!username || !password) {
      errEl.textContent = 'Please fill in all fields.';
      errEl.style.display = 'block'; return;
    }

    btn.classList.add('loading'); btn.disabled = true;
    errEl.style.display = 'none';

    try {
      const user = await sbSignIn(username, password);

      // Check role → redirect accordingly
      const profile = await sbGetProfile();
      if (profile?.role === 'admin') {
        window.location.href = 'index.html';
      } else {
        window.location.href = 'employee-dashboard.html';
      }
    } catch (error) {
      errEl.textContent = error.message.includes('Invalid login') 
        ? '❌ Wrong username or password.' 
        : error.message;
      errEl.style.display = 'block';
      btn.classList.remove('loading'); btn.disabled = false;
    }
  });

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-login').click();
  });

  // If already logged in, redirect
  (async () => {
    const { data: { user } } = await _sb.auth.getUser();
    if (user) {
      const profile = await sbGetProfile();
      window.location.href = profile?.role === 'admin' ? 'index.html' : 'employee-dashboard.html';
    }
  })();
</script>
</body>
</html>
